services:
  heading: "What we do"
  subheading: "End-to-end product development for startups and scaleups"
  items:
    - title: "Product Strategy & Roadmap"
      description: "Validate your idea, define your MVP, and plan a roadmap that gets you to product-market fit."
      icon: "compass"
    - title: "Web & Mobile Engineering"
      description: "Full-stack development across web and mobile using modern, maintainable architectures."
      icon: "code"
    - title: "AI & Automation"
      description: "Practical AI features — from copilots to workflow automation — built on your real data."
      icon: "sparkles"
    - title: "Cloud Infrastructure & DevOps"
      description: "Scalable, secure infrastructure with CI/CD pipelines so you can ship with confidence."
      icon: "cloud"
    - title: "UI/UX Design"
      description: "Interfaces that are simple, fast, and built around how your users actually work."
      icon: "layout"
    - title: "QA & Reliability"
      description: "Automated testing and monitoring to keep quality high as you move fast."
      icon: "shield"

whyUs:
  heading: "Why startups choose us"
  items:
    - title: "Founder-first approach"
      description: "We think like operators, not vendors — every decision is weighed against your runway and goals."
    - title: "Senior engineers only"
      description: "No bait-and-switch staffing. You work directly with experienced builders from day one."
    - title: "Fixed-scope sprints"
      description: "Transparent pricing and predictable delivery in two-week cycles."
    - title: "Built to scale"
      description: "Architecture decisions made with your next funding round in mind, not just your MVP."
    - title: "Fast iteration"
      description: "Weekly demos and tight feedback loops keep you in control of the product direction."
    - title: "Long-term partnership"
      description: "We stick around post-launch to support, iterate, and grow with you."

